<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 3D Compact | مراقبة الشبكة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --accent: #7000ff; --bg: #050a10; }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: white;
            margin: 0; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #101a25 0%, #050a10 100%);
        }

        /* نافذة تسجيل الدخول */
        #loginOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); display: flex; justify-content: center; 
            align-items: center; z-index: 9999;
        }
        .login-box {
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px;
            border: 1px solid var(--primary); text-align: center; width: 320px;
        }
        .login-box input {
            width: 90%; padding: 10px; margin: 8px 0; border-radius: 10px;
            border: 1px solid #333; background: #000; color: white; text-align: center;
        }
        .login-box button {
            width: 95%; padding: 12px; background: var(--primary); border: none;
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        /* شريط التحكم العلوي */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100;
        }
        .nav-btn {
            padding: 6px 15px; border-radius: 8px; border: 1px solid var(--primary);
            background: transparent; color: white; cursor: pointer; font-size: 0.8rem;
            font-family: 'Cairo'; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--primary); color: #000; }
        .btn-logout { border-color: #ff4d4d; color: #ff4d4d; }
        .btn-logout:hover { background: #ff4d4d; color: white; }

        /* الحاوية والكروت المصغرة */
        .container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px; padding: 20px; perspective: 1000px;
        }
        .card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 12px; text-align: center;
            transition: 0.4s; position: relative; transform-style: preserve-3d;
        }
        .card:hover {
            transform: translateZ(10px) rotateX(5deg);
            border-color: var(--primary); background: rgba(255,255,255,0.07);
        }
        .card.is-blocked { border-color: #ff4d4d; opacity: 0.6; filter: grayscale(1); }

        .card img { width: 45px; height: 45px; margin-bottom: 8px; filter: drop-shadow(0 0 5px var(--primary)); }
        .card h3 { font-size: 0.85rem; margin: 5px 0; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { font-size: 0.7rem; margin: 3px 0; color: #bbb; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 3px; }

        .btn {
            width: 100%; padding: 6px; border-radius: 6px; border: none;
            font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 0.75rem;
        }
        .btn-block { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; border: 1px solid #ff4d4d; }
        .btn-unblock { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
        
        .status-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; border-radius: 50%; }
        .bg-online { background: #00ff88; box-shadow: 0 0 5px #00ff88; }
        .bg-blocked { background: #ff4d4d; }

        #chartArea { width: 90%; margin: 30px auto; background: rgba(255,255,255,0.02); border-radius: 20px; padding: 15px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--primary)">📡 دخول النظام</h2>
        <input type="text" id="r_ip" placeholder="IP الراوتر" value="192.168.1.1">
        <input type="text" id="r_user" placeholder="اسم المستخدم">
        <input type="password" id="r_pass" placeholder="كلمة المرور">
        <button onclick="manualLogin()">تسجيل دخول</button>
    </div>
</div>

<div id="dashboard" style="display:none">
    <div class="top-bar">
        <button class="nav-btn btn-logout" onclick="logout()">خروج</button>
        <span style="font-size:0.85rem; font-weight:bold; color:var(--primary)">
            الأجهزة النشطة: <span id="count">0</span>
        </span>
        <button class="nav-btn" onclick="refreshData()">تحديث</button>
    </div>

    <h1 style="text-align:center; font-size: 1.5rem; color:var(--primary); margin: 20px 0;">NETWORK COMMAND CENTER</h1>

    <div class="container" id="cardsBox"></div>
    <div id="chartArea"><canvas id="usageChart"></canvas></div>
</div>

<script>
let routerCreds = null;
let myChart = null;

window.onload = () => {
    const saved = localStorage.getItem('router_auto_login');
    if (saved) {
        routerCreds = JSON.parse(saved);
        showDashboard();
    }
};

function manualLogin() {
    const ip = document.getElementById('r_ip').value;
    const user = document.getElementById('r_user').value;
    const pass = document.getElementById('r_pass').value;

    if(!ip || !user || !pass) {
        alert("يرجى ملء جميع الحقول");
        return;
    }

    routerCreds = {
        router_ip: ip,
        username: user,
        password: pass
    };
    localStorage.setItem('router_auto_login', JSON.stringify(routerCreds));
    showDashboard();
}

function logout() {
    if(confirm("هل تريد الخروج ومسح بيانات الدخول؟")) {
        localStorage.removeItem('router_auto_login');
        location.reload();
    }
}

function showDashboard() {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    refreshData();
    // تحديث تلقائي كل 30 ثانية
    setInterval(refreshData, 30000);
}

async function refreshData() {
    const refreshBtn = document.querySelector('.nav-btn:not(.btn-logout)');
    if(refreshBtn) refreshBtn.innerText = "جاري التحديث...";
    
    try {
        const res = await fetch('/api/devices', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(routerCreds) // إرسال كامل البيانات للسيرفر المحدث
        });

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || "خطأ في الاتصال");
        }

        const devices = await res.json();
        renderUI(devices);
    } catch (e) { 
        console.error("Refresh failed:", e);
        alert("فشل التحديث: " + e.message);
    }
    
    if(refreshBtn) refreshBtn.innerText = "تحديث";
}

function renderUI(devices) {
    document.getElementById('count').innerText = devices.filter(d => d.Status === 'Online').length;
    const box = document.getElementById('cardsBox');
    box.innerHTML = '';
    
    devices.forEach(d => {
        const isB = d.Status === 'Blocked';
        const card = document.createElement('div');
        card.className = `card ${isB ? 'is-blocked' : ''}`;
        card.innerHTML = `
            <div class="status-dot ${isB ? 'bg-blocked' : 'bg-online'}"></div>
            <img src="https://cdn-icons-png.flaticon.com/512/633/633600.png">
            <h3>${d.Device}</h3>
            <p>IP: ${d.IP}</p>
            <p style="font-size:0.6rem">MAC: ${d.MAC}</p>
            <p>Data: ${d.DataUsage} GB</p>
            <button class="btn ${isB ? 'btn-unblock' : 'btn-block'}" 
                onclick="toggleBlock('${d.MAC}', '${d.IP}', '${d.Device}', '${isB ? 'unblock' : 'block'}')">
                ${isB ? 'إلغاء الحظر' : 'طرد نهائي'}
            </button>
        `;
        box.appendChild(card);
    });
    updateChart(devices);
}

function updateChart(devices) {
    const ctx = document.getElementById('usageChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: devices.map(d => d.Device),
            datasets: [{
                label: 'الاستهلاك (GB)',
                data: devices.map(d => d.DataUsage),
                backgroundColor: 'rgba(0, 242, 255, 0.4)',
                borderColor: '#00f2ff', borderWidth: 1
            }]
        },
        options: { 
            responsive: true,
            scales: { 
                y: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.05)' } }, 
                x: { ticks: { color: 'white' }, grid: { display: false } } 
            },
            plugins: { 
                legend: { labels: { color: 'white', font: { family: 'Cairo' } } } 
            }
        }
    });
}

async function toggleBlock(mac, ip, name, action) {
    if (action === 'block' && !confirm(`هل أنت متأكد من حظر الجهاز: ${name}؟`)) return;
    try {
        await fetch('/api/block_action', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({MAC: mac, IP: ip, Device: name, action: action})
        });
        refreshData();
    } catch (e) {
        alert("فشل تنفيذ الإجراء");
    }
}
</script>
</body>
</html>
